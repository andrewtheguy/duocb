name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_title: ${{ steps.tag.outputs.release_title }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
      minor_version: ${{ steps.version.outputs.minor_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="duocb") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not parse version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor_version=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
      - name: Generate Tag
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Tag and name are always derived from the Cargo.toml version so the flow is
          # uniform across releases and prereleases. Whether it's a prerelease is decided
          # purely by the branch this workflow runs against (anything other than main).
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "release_title=Prerelease v$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_title=Release v$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.tag.outputs.release_tag }}" | grep -q .; then
            echo "::error::Tag ${{ steps.tag.outputs.release_tag }} already exists on remote"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Clean up any leftover draft from a previous failed run with the same tag.
          # A draft release doesn't create the git tag on the remote, so a stale draft is the
          # only thing that can collide here (real published tags are caught by the step above).
          if gh release view "${{ steps.tag.outputs.release_tag }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.tag.outputs.release_tag }}"
            gh release delete "${{ steps.tag.outputs.release_tag }}" --yes
          fi
          args=()
          if [ "${{ steps.tag.outputs.is_prerelease }}" = "true" ]; then
            args+=(--prerelease)
          else
            # Generate notes against the previous *stable* release, not the latest prerelease.
            prev_stable=$(gh release list --exclude-pre-releases --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // empty')
            if [ -n "$prev_stable" ]; then
              args+=(--notes-start-tag "$prev_stable")
            fi
          fi
          gh release create "${{ steps.tag.outputs.release_tag }}" \
            --draft \
            --target "${{ github.sha }}" \
            --title "${{ steps.tag.outputs.release_title }}" \
            --generate-notes \
            "${args[@]}"

  build-linux:
    needs: setup
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI build + AppImage packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            file desktop-file-utils patchelf squashfs-tools

      - name: Build Release
        run: |
          cargo build --release -p duocb --target ${{ matrix.target }}

      - uses: cargo-bins/cargo-binstall@main

      - name: Package AppImage
        # cargo-packager downloads linuxdeploy + appimagetool itself. Both run
        # under FUSE by default, which the runner lacks; extract-and-run avoids it.
        # Run from the desktop crate dir so packager reads its [package.metadata.packager];
        # the shared workspace target/ stays at the repo root.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          cargo binstall -y --force cargo-packager@0.11.8
          (cd crates/duocb && cargo packager --release --formats appimage --target ${{ matrix.target }})
          mv target/${{ matrix.target }}/release/*.AppImage target/release/duocb-${{ matrix.suffix }}.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: target/release/duocb-${{ matrix.suffix }}.AppImage

  build-macos:
    needs: setup
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: |
          cargo build --release -p duocb --target aarch64-apple-darwin

      - uses: cargo-bins/cargo-binstall@main

      - name: Package desktop app (.dmg, unsigned)
        # Unsigned: browser downloads get the quarantine attribute; users clear it
        # with `xattr -dr com.apple.quarantine duocb.app`. The dmg format wraps the
        # .app in a drag-to-Applications disk image (cargo-packager builds the .app
        # bundle first as a prerequisite). Run from the desktop crate dir so
        # packager reads its [package.metadata.packager].
        run: |
          cargo binstall -y --force cargo-packager@0.11.8
          (cd crates/duocb && cargo packager --release --formats dmg --target aarch64-apple-darwin)
          mv target/aarch64-apple-darwin/release/*.dmg target/release/duocb-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: target/release/duocb-macos-arm64.dmg

  build-windows:
    needs: setup
    if: needs.setup.outputs.is_prerelease == 'false'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: |
          cargo build --release -p duocb --target x86_64-pc-windows-msvc

      - uses: cargo-bins/cargo-binstall@main

      - name: Package desktop installer (.msi, unsigned)
        # cargo-packager downloads the WiX toolset itself. Unsigned: users see
        # the SmartScreen "unknown publisher" prompt. Run from the desktop crate
        # dir so packager reads its [package.metadata.packager].
        run: |
          cargo binstall -y --force cargo-packager@0.11.8
          Set-Location crates/duocb
          cargo packager --release --formats wix --target x86_64-pc-windows-msvc
          Set-Location ../..
          Move-Item target/x86_64-pc-windows-msvc/release/*.msi target/release/duocb-windows-amd64.msi

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: target/release/duocb-windows-amd64.msi

  build-ios:
    needs: setup
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Build iOS xcframework + header
        run: ./build-ios.sh release

      - name: Package xcframework + header
        run: |
          cd dist/ios
          zip -r libduocb-ios.xcframework.zip libduocb.xcframework duocb.h

      - uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: dist/ios/libduocb-ios.xcframework.zip

  publish-release:
    needs: [setup, build-linux, build-macos, build-ios, build-windows]
    if: always() && needs.setup.result == 'success' && needs.build-linux.result == 'success' && needs.build-macos.result == 'success' && needs.build-ios.result == 'success' && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.setup.outputs.release_tag }}" artifacts/* --clobber

      - name: Publish release (remove draft, creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.setup.outputs.release_tag }}" --draft=false
