<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E8BF0"/>
      <stop offset="100%" stop-color="#1746C8"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0c2a63" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#sheen)"/>

  <!-- Back clipboard -->
  <g transform="translate(432,452) rotate(-11)" filter="url(#softShadow)">
    <rect x="-186" y="-224" width="372" height="448" rx="54" fill="#eaf3fe" opacity="0.92"/>
    <rect x="-78" y="-252" width="156" height="56" rx="22" fill="#bcd8f7"/>
  </g>

  <!-- Front clipboard -->
  <g transform="translate(576,588) rotate(9)" filter="url(#softShadow)">
    <rect x="-186" y="-224" width="372" height="448" rx="54" fill="#ffffff"/>
    <rect x="-78" y="-252" width="156" height="56" rx="22" fill="#dcebfc"/>
    <rect x="-78" y="-252" width="156" height="56" rx="22" fill="none" stroke="#b7d6f6" stroke-width="4"/>

    <!-- content lines -->
    <rect x="-124" y="-120" width="248" height="30" rx="15" fill="#bcdafb"/>
    <rect x="-124" y="-58" width="248" height="30" rx="15" fill="#bcdafb"/>
    <rect x="-124" y="4"   width="164" height="30" rx="15" fill="#bcdafb"/>
  </g>
</svg>
