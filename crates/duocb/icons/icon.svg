<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2E8BF0"/>
      <stop offset="1" stop-color="#1746C8"/>
    </linearGradient>
  </defs>

  <!-- macOS-style rounded-square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Two overlapping clipboard cards, suggesting sharing between two devices -->
  <g fill="none" stroke="#FFFFFF" stroke-linejoin="round" stroke-linecap="round">
    <!-- Back card (the "other" device), semi-transparent -->
    <g opacity="0.45">
      <rect x="330" y="250" width="340" height="430" rx="52" ry="52" stroke-width="46"/>
    </g>

    <!-- Front card -->
    <g>
      <rect x="230" y="330" width="340" height="430" rx="52" ry="52" fill="url(#bg)" stroke-width="46"/>
      <!-- Clip at the top of the front card -->
      <rect x="350" y="300" width="100" height="72" rx="26" ry="26" fill="#FFFFFF" stroke-width="34"/>
      <!-- Content lines -->
      <line x1="310" y1="470" x2="490" y2="470" stroke-width="38"/>
      <line x1="310" y1="560" x2="490" y2="560" stroke-width="38"/>
      <line x1="310" y1="650" x2="420" y2="650" stroke-width="38"/>
    </g>
  </g>
</svg>
